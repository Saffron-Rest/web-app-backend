# web-app-backend — one pipeline: test → build → deploy
name: pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/saffron-rest/web-app-backend

jobs:
  test:
    name: 1 · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B -q verify

  build:
    name: 2 · Build & push image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 3 · Deploy API to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
      url: http://shop.saffron.waw.pl/api
    steps:
      - uses: actions/checkout@v4

      - name: Verify deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          WEBAPP_DB_PASSWORD: ${{ secrets.WEBAPP_DB_PASSWORD }}
        run: |
          missing=0
          if [ -z "$VPS_HOST" ]; then echo "::error::Missing secret VPS_HOST (e.g. 76.13.130.67)"; missing=1; fi
          if [ -z "$VPS_USER" ]; then echo "::error::Missing secret VPS_USER (e.g. root)"; missing=1; fi
          if [ -z "$SSH_PRIVATE_KEY" ] && [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Missing SSH key — add secret SSH_PRIVATE_KEY (or VPS_SSH_KEY)"; missing=1
          fi
          if [ -z "$GHCR_TOKEN" ];    then echo "::error::Missing GHCR_TOKEN — PAT with read:packages"; missing=1; fi
          if [ -z "$GHCR_USERNAME" ]; then echo "::error::Missing GHCR_USERNAME"; missing=1; fi
          if [ -z "$WEBAPP_DB_PASSWORD" ]; then echo "::error::Missing WEBAPP_DB_PASSWORD (must match the web-app-postgres password)"; missing=1; fi
          exit "$missing"

      - name: Upload deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: deploy/
          target: /docker/web-app-backend/
          strip_components: 1

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_IMAGE: ${{ env.IMAGE }}:latest
          REGISTRY_USER: ${{ secrets.GHCR_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.GHCR_TOKEN }}
          WEBAPP_DB_USER: ${{ secrets.WEBAPP_DB_USER }}
          WEBAPP_DB_PASSWORD: ${{ secrets.WEBAPP_DB_PASSWORD }}
          WEBAPP_DB_NAME: ${{ secrets.WEBAPP_DB_NAME }}
          STOREFRONT_PUBLIC_URL: ${{ secrets.STOREFRONT_PUBLIC_URL }}
          STOREFRONT_CORS_ORIGINS: ${{ secrets.STOREFRONT_CORS_ORIGINS }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          WOLT_DRIVE_ENABLED: ${{ secrets.WOLT_DRIVE_ENABLED }}
          WOLT_DRIVE_MERCHANT_ID: ${{ secrets.WOLT_DRIVE_MERCHANT_ID }}
          WOLT_DRIVE_API_KEY: ${{ secrets.WOLT_DRIVE_API_KEY }}
          GLOVO_COURIER_ENABLED: ${{ secrets.GLOVO_COURIER_ENABLED }}
          GLOVO_COURIER_API_KEY: ${{ secrets.GLOVO_COURIER_API_KEY }}
          DHL_EXPRESS_ENABLED: ${{ secrets.DHL_EXPRESS_ENABLED }}
          DHL_EXPRESS_API_KEY: ${{ secrets.DHL_EXPRESS_API_KEY }}
          DHL_EXPRESS_API_SECRET: ${{ secrets.DHL_EXPRESS_API_SECRET }}
          DHL_EXPRESS_ACCOUNT: ${{ secrets.DHL_EXPRESS_ACCOUNT }}
          DPD_PL_ENABLED: ${{ secrets.DPD_PL_ENABLED }}
          DPD_PL_LOGIN: ${{ secrets.DPD_PL_LOGIN }}
          DPD_PL_PASSWORD: ${{ secrets.DPD_PL_PASSWORD }}
          DPD_PL_FID: ${{ secrets.DPD_PL_FID }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          envs: BACKEND_IMAGE,REGISTRY_USER,REGISTRY_PASSWORD,WEBAPP_DB_USER,WEBAPP_DB_PASSWORD,WEBAPP_DB_NAME,STOREFRONT_PUBLIC_URL,STOREFRONT_CORS_ORIGINS,STRIPE_SECRET_KEY,STRIPE_PUBLISHABLE_KEY,STRIPE_WEBHOOK_SECRET,WOLT_DRIVE_ENABLED,WOLT_DRIVE_MERCHANT_ID,WOLT_DRIVE_API_KEY,GLOVO_COURIER_ENABLED,GLOVO_COURIER_API_KEY,DHL_EXPRESS_ENABLED,DHL_EXPRESS_API_KEY,DHL_EXPRESS_API_SECRET,DHL_EXPRESS_ACCOUNT,DPD_PL_ENABLED,DPD_PL_LOGIN,DPD_PL_PASSWORD,DPD_PL_FID
          script: |
            chmod +x /docker/web-app-backend/deploy.sh
            export VPS_APP_DIR=/docker/web-app-backend
            bash /docker/web-app-backend/deploy.sh
