# Local dev profile — H2 file DB so we can run without Postgres.
# Persists between restarts in ./.local-db/storefront.* so the seeded menu sticks.
spring:
  datasource:
    url: jdbc:h2:file:./.local-db/storefront;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2

app:
  cors:
    allowed-origins: http://localhost:5174,http://localhost:5173,http://127.0.0.1:5174,http://127.0.0.1:5173
